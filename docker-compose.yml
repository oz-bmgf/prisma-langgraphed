services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: langgraph
      POSTGRES_PASSWORD: langgraph
      POSTGRES_DB: langgraph
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langgraph"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Langfuse v3 dependencies ────────────────────────────────────────────────

  clickhouse:
    image: clickhouse/clickhouse-server:24.12
    environment:
      CLICKHOUSE_DB: default
      CLICKHOUSE_USER: clickhouse
      CLICKHOUSE_PASSWORD: clickhouse
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8123/ping || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # MinIO provides S3-compatible object storage for Langfuse event + media blobs.
  # Host port 9091 avoids collision with ClickHouse's 9000; internal port stays 9000
  # so Langfuse containers reach it at http://minio:9000 over the Docker network.
  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    ports:
      - "9091:9000"   # S3 API
      - "9092:9001"   # MinIO web console → http://localhost:9092
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: miniosecret
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10

  # One-shot init container: creates the two buckets Langfuse needs, then exits.
  minio-init:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minio miniosecret &&
        mc mb --ignore-existing local/langfuse-events &&
        mc mb --ignore-existing local/langfuse-media
      "

  # ── Langfuse v3 server + worker ─────────────────────────────────────────────
  # Docker image :3 = Langfuse SDK v4 (rewritten March 2026).

  langfuse-server:
    image: langfuse/langfuse:3
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://langgraph:langgraph@postgres:5432/langfuse
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: ${LANGFUSE_NEXTAUTH_SECRET}
      SALT: ${LANGFUSE_SALT}
      # ClickHouse (single-node — no Zookeeper/ReplicatedMergeTree)
      CLICKHOUSE_URL: http://clickhouse:8123
      CLICKHOUSE_MIGRATION_URL: clickhouse://clickhouse:clickhouse@clickhouse:9000
      CLICKHOUSE_USER: clickhouse
      CLICKHOUSE_PASSWORD: clickhouse
      CLICKHOUSE_CLUSTER_ENABLED: "false"
      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      # S3 — event storage (required in v3)
      LANGFUSE_S3_EVENT_UPLOAD_BUCKET: langfuse-events
      LANGFUSE_S3_EVENT_UPLOAD_REGION: us-east-1
      LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT: http://minio:9000
      LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID: minio
      LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY: miniosecret
      LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE: "true"
      # S3 — media storage
      LANGFUSE_S3_MEDIA_UPLOAD_BUCKET: langfuse-media
      LANGFUSE_S3_MEDIA_UPLOAD_REGION: us-east-1
      LANGFUSE_S3_MEDIA_UPLOAD_ENDPOINT: http://minio:9000
      LANGFUSE_S3_MEDIA_UPLOAD_ACCESS_KEY_ID: minio
      LANGFUSE_S3_MEDIA_UPLOAD_SECRET_ACCESS_KEY: miniosecret
      LANGFUSE_S3_MEDIA_UPLOAD_FORCE_PATH_STYLE: "true"
      LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES: "true"
      LANGFUSE_INGESTION_USE_IMMUTABLE_OBSERVATIONS: "true"
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully

  langfuse-worker:
    image: langfuse/langfuse-worker:3
    environment:
      DATABASE_URL: postgresql://langgraph:langgraph@postgres:5432/langfuse
      CLICKHOUSE_URL: http://clickhouse:8123
      CLICKHOUSE_MIGRATION_URL: clickhouse://clickhouse:clickhouse@clickhouse:9000
      CLICKHOUSE_USER: clickhouse
      CLICKHOUSE_PASSWORD: clickhouse
      CLICKHOUSE_CLUSTER_ENABLED: "false"
      REDIS_HOST: redis
      REDIS_PORT: 6379
      LANGFUSE_S3_EVENT_UPLOAD_BUCKET: langfuse-events
      LANGFUSE_S3_EVENT_UPLOAD_REGION: us-east-1
      LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT: http://minio:9000
      LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID: minio
      LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY: miniosecret
      LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE: "true"
      LANGFUSE_S3_MEDIA_UPLOAD_BUCKET: langfuse-media
      LANGFUSE_S3_MEDIA_UPLOAD_REGION: us-east-1
      LANGFUSE_S3_MEDIA_UPLOAD_ENDPOINT: http://minio:9000
      LANGFUSE_S3_MEDIA_UPLOAD_ACCESS_KEY_ID: minio
      LANGFUSE_S3_MEDIA_UPLOAD_SECRET_ACCESS_KEY: miniosecret
      LANGFUSE_S3_MEDIA_UPLOAD_FORCE_PATH_STYLE: "true"
      LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES: "true"
      LANGFUSE_INGESTION_USE_IMMUTABLE_OBSERVATIONS: "true"
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully

  # ── OTEL Collector ───────────────────────────────────────────────────────────
  # Receives spans from the graph process (gRPC :4317 / HTTP :4318) and fans them
  # out to Phoenix and Langfuse.  Config is generated at startup from
  # otel/collector.config.yaml.j2 by otel/generate_config.py, driven by
  # PHOENIX_TRACING_ENABLED, LANGFUSE_TRACING_ENABLED, and related env vars.
  # After changing .env toggles, rebuild with: docker compose build otel-collector

  otel-collector:
    build:
      context: ./otel
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - "4317:4317"   # gRPC  — app connects here
      - "4318:4318"   # HTTP  — optional / debug
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 8g    # must exceed memory_limiter limit_mib (6144) + spike_limit_mib (1536)
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:13133/"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── Graph process ────────────────────────────────────────────────────────────
  # Tracing flows to the local otel-collector via HTTP/Protobuf BatchSpanProcessor.
  # The collector fans out to Phoenix and Langfuse based on PHOENIX_*/LANGFUSE_*
  # env vars.  LangSmith remains on the native LANGCHAIN_TRACING_V2 SDK path.

  graph:
    build: .
    ports:
      - "8125:8125"
    env_file:
      - .env
    environment:
      NQPR_CHECKPOINTER_BACKEND: postgres
      NQPR_CHECKPOINT_POSTGRES_DSN: postgresql://langgraph:langgraph@postgres:5432/langgraph
      DATABASE_URL: postgresql://langgraph:langgraph@postgres:5432/langgraph
      OTEL_SERVICE_NAME: prisma-langgraphed
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
    depends_on:
      postgres:
        condition: service_healthy
      otel-collector:
        condition: service_healthy
    volumes:
      - .:/app

volumes:
  postgres_data:
  clickhouse_data:
  minio_data:
